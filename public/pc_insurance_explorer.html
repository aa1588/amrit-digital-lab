<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>P&C Insurance Data Model Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── Base ────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f4;--bg2:#f2efe8;--bg3:#eae6dc;
  --ink:#1a1814;--ink2:#4a4540;--ink3:#8a8278;
  --border:#ddd9d0;--border2:#ccc8be;
  --mono:'DM Mono',monospace;--sans:'Outfit',sans-serif;--serif:'Fraunces',Georgia,serif;
  --radius:12px;--shadow:0 2px 12px #00000010;--shadow2:0 8px 32px #00000018;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}

/* ── Layout ──────────────────────────────────────── */
#app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
#topbar{grid-column:1/-1;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;position:sticky;top:0;z-index:50}
#sidebar{border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);padding:12px 0 20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#content{overflow-y:auto;padding:32px 40px 60px;scrollbar-width:thin}

/* ── Topbar ──────────────────────────────────────── */
.logo{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.logo span{color:var(--dc,#6366f1)}
#search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:260px}
#search input{border:none;background:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--ink);width:100%}
#search input::placeholder{color:var(--ink3)}
.search-icon{color:var(--ink3);font-size:14px;flex-shrink:0}
#stats-bar{display:flex;gap:16px;margin-left:16px}
.stat{font-family:var(--mono);font-size:10px;color:var(--ink3);white-space:nowrap}
.stat strong{color:var(--ink2)}

/* ── Sidebar ──────────────────────────────────────── */
.sb-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:4px 18px 6px;margin-top:8px}
.domain-btn{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink2);transition:all .15s;border-left:2px solid transparent;position:relative}
.domain-btn:hover{background:var(--bg3);color:var(--ink)}
.domain-btn.active{background:var(--bg);color:var(--ink);border-left-color:var(--dc);font-weight:600}
.domain-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--dc);flex-shrink:0}
.domain-btn .cnt{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-left:auto;background:var(--bg3);padding:1px 6px;border-radius:8px}
.domain-btn.active .cnt{background:var(--bg2)}

/* ── Content Sections ────────────────────────────── */
.domain-header{margin-bottom:28px}
.domain-eyebrow{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.domain-eyebrow::before{content:'';width:20px;height:2px;background:var(--dc);border-radius:2px;display:inline-block}
.domain-title{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:6px;letter-spacing:-.02em}
.domain-title .accent{color:var(--dc)}
.domain-desc{font-size:14px;color:var(--ink2);max-width:640px;line-height:1.7}
.domain-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--ink3);background:var(--bg2)}

/* ── Tabs ────────────────────────────────────────── */
.tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:24px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;border:none;background:none;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s}
.tab.active{background:var(--bg);color:var(--ink);box-shadow:var(--shadow)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Use Case Box ────────────────────────────────── */
.usecase{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--dc);border-radius:0 10px 10px 0;padding:18px 22px;margin-bottom:24px}
.usecase-tag{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--dc);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.usecase-text{font-size:13.5px;color:var(--ink2);line-height:1.85}
.usecase-text strong{color:var(--ink)}
.usecase-text code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--ink2)}

/* ── Key Insights ────────────────────────────────── */
.insights{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:28px}
.insight{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .2s}
.insight:hover{border-color:var(--dc)}
.insight-icon{font-size:20px;margin-bottom:6px}
.insight-title{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--ink);margin-bottom:4px}
.insight-desc{font-size:11.5px;color:var(--ink2);line-height:1.55}

/* ── Entity Grid ──────────────────────────────────── */
.entity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:28px}
.entity-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s}
.entity-card:hover{border-color:var(--dc);box-shadow:var(--shadow)}
.entity-card.expanded{border-color:var(--dc)}
.ec-head{padding:10px 14px;display:flex;align-items:center;gap:9px;background:var(--bg2);border-bottom:1px solid var(--border)}
.ec-dot{width:7px;height:7px;border-radius:50%;background:var(--dc);flex-shrink:0}
.ec-name{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink)}
.ec-type{font-size:10px;color:var(--ink3);margin-left:auto;background:var(--bg3);padding:2px 7px;border-radius:5px;border:1px solid var(--border)}
.ec-toggle{font-size:11px;color:var(--ink3);margin-left:6px;transition:transform .2s}
.entity-card.expanded .ec-toggle{transform:rotate(180deg)}
.ec-fields{padding:10px 14px;display:none}
.entity-card.expanded .ec-fields{display:block}
.ec-field{display:flex;align-items:center;gap:6px;padding:3px 0;font-family:var(--mono);font-size:11px;color:var(--ink2);border-bottom:1px solid var(--border);gap:5px}
.ec-field:last-child{border:none}
.ec-fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ec-ft{color:var(--ink3);font-size:10px;white-space:nowrap}
.badge-pk{font-size:8px;font-weight:600;color:#16a34a;border:1px solid #16a34a;border-radius:3px;padding:0 3px;white-space:nowrap}
.badge-fk{font-size:8px;font-weight:600;color:#7c3aed;border:1px solid #7c3aed;border-radius:3px;padding:0 3px;white-space:nowrap}
.badge-idx{font-size:8px;font-weight:600;color:#d97706;border:1px solid #d97706;border-radius:3px;padding:0 3px;white-space:nowrap}

/* ── SQL Block ───────────────────────────────────── */
.sql-section{display:flex;flex-direction:column;gap:14px}
.sql-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sql-head{padding:9px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink2)}
.sql-new{font-size:8px;font-weight:600;color:#16a34a;border:1px solid #16a34a;border-radius:3px;padding:0 4px;margin-left:auto}
pre.sql-code{padding:14px 16px;font-family:var(--mono);font-size:11.5px;line-height:1.8;color:#3d3830;overflow-x:auto;tab-size:2}
.kw{color:#1d4ed8;font-weight:600}
.ty{color:#b45309}
.cm{color:#9ca3af;font-style:italic}
.pk-c{color:#15803d;font-weight:600}
.fk-c{color:#7c3aed}
.cn{color:#6b7280}
.nm{color:#1a1814}

/* ── Data Tables ──────────────────────────────────── */
.data-section{display:flex;flex-direction:column;gap:16px}
.table-container{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-caption{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
.table-caption-note{font-size:11px;color:var(--ink3);font-weight:400;margin-left:auto}
.table-scroll{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px}
table.dt th{padding:8px 12px;background:var(--bg3);color:var(--ink3);font-size:10px;font-weight:600;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
table.dt td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--ink2);white-space:nowrap}
table.dt tr:last-child td{border:none}
table.dt tr:hover td{background:var(--bg2)}
.v-pk{color:#15803d;font-weight:600}
.v-fk{color:#7c3aed}
.v-hi{color:var(--dc);font-weight:500}
.v-null{color:var(--ink3);font-style:italic}

/* ── Relationship Section ────────────────────────── */
.rel-section{display:flex;flex-direction:column;gap:12px}
.rel-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.rel-head{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
.rel-dot{width:8px;height:8px;border-radius:50%;background:var(--dc)}
.rel-item{display:grid;grid-template-columns:minmax(200px,auto) 1fr;border-bottom:1px solid var(--border)}
.rel-item:last-child{border:none}
.rel-from{padding:10px 14px;background:var(--bg2);border-right:1px solid var(--border);font-family:var(--mono);font-size:10.5px;display:flex;flex-direction:column;gap:4px;justify-content:center}
.rel-ent{font-weight:600;color:var(--dc)}
.rel-card-label{font-size:9px;color:var(--ink3);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;width:fit-content}
.rel-desc{padding:10px 14px;font-size:12.5px;color:var(--ink2);line-height:1.65}
.rel-desc strong{color:var(--ink)}
.rel-desc code{font-family:var(--mono);font-size:10.5px;background:var(--bg3);padding:1px 4px;border-radius:3px}

/* ── Cross-domain links ──────────────────────────── */
.xlinks{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-top:24px}
.xlinks-title{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.xlinks-title::before{content:'↗';font-size:13px;color:var(--dc)}
.xlink-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.xlink{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;transition:border-color .2s}
.xlink:hover{border-color:var(--dc)}
.xlink-target{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.xlink-via{font-family:var(--mono);font-size:9.5px;color:var(--ink3);margin-bottom:5px;word-break:break-all;line-height:1.4}
.xlink-why{font-size:11.5px;color:var(--ink2);line-height:1.5}

/* ── Search Results ──────────────────────────────── */
#search-results{position:absolute;top:50px;right:20px;width:400px;background:var(--bg);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow2);z-index:200;display:none;max-height:380px;overflow-y:auto}
.sr-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.sr-item:last-child{border:none}
.sr-item:hover{background:var(--bg2)}
.sr-domain{font-size:10px;color:var(--ink3);font-family:var(--mono);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.sr-name{font-size:13px;font-weight:600;color:var(--ink)}
.sr-hint{font-size:11px;color:var(--ink2);margin-top:2px}
.sr-empty{padding:20px;text-align:center;color:var(--ink3);font-size:13px}

/* ── Hero / Home ──────────────────────────────────── */
#home{animation:fadeUp .4s ease both}
.hero-title{font-family:var(--serif);font-size:42px;font-weight:700;line-height:1.08;letter-spacing:-.03em;color:var(--ink);margin-bottom:14px}
.hero-title span{color:#6366f1}
.hero-sub{font-size:16px;color:var(--ink2);max-width:580px;line-height:1.75;margin-bottom:32px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:40px}
.home-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
.home-card:hover{border-color:var(--dc);transform:translateY(-2px);box-shadow:var(--shadow2)}
.hc-num{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-bottom:8px;letter-spacing:.1em}
.hc-dot{width:10px;height:10px;border-radius:50%;margin-bottom:10px}
.hc-name{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.hc-count{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.hc-desc{font-size:12px;color:var(--ink2);margin-top:6px;line-height:1.5}
.home-stats{display:flex;gap:32px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px 32px;margin-bottom:32px}
.hstat{text-align:center}
.hstat-n{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--ink);letter-spacing:-.03em}
.hstat-l{font-family:var(--mono);font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.story-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px 28px;margin-bottom:32px}
.story-title{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink);margin-bottom:10px}
.story-text{font-size:14px;color:var(--ink2);line-height:1.85}
.story-text strong{color:var(--ink)}

/* ── Animations ──────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.domain-view{animation:fadeUp .3s ease both}

/* ── Scrollbar ───────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Inheritance tree ────────────────────────────── */
.tree{font-family:var(--mono);font-size:11.5px;line-height:2.1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:24px;color:var(--ink2)}
.tree-root{color:var(--dc);font-weight:600;font-size:12.5px}
.tree-l1{padding-left:18px;color:var(--ink2)}
.tree-l1::before{content:'├─ ';color:var(--ink3)}
.tree-l2{padding-left:36px;color:var(--ink3)}
.tree-l2::before{content:'├─ ';color:var(--border2)}
.tree-l3{padding-left:54px;color:var(--ink3);font-size:10.5px}
.tree-l3::before{content:'└─ ';color:var(--border2)}
.tree-note{color:var(--ink3);font-size:9.5px;padding-left:5px}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<header id="topbar">
  <div class="logo">P&C <span>Insurance</span> Explorer</div>
  <div id="stats-bar">
    <div class="stat"><strong>10</strong> Domains</div>
    <div class="stat"><strong>~200</strong> Entities</div>
    <div class="stat"><strong>~500</strong> Relationships</div>
  </div>
  <div id="search" style="position:relative">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search entities, tables, fields…" id="searchInput" autocomplete="off"/>
    <div id="search-results"></div>
  </div>
</header>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sb-label">Navigate</div>
  <button class="domain-btn active" onclick="showHome()" id="btn-home" style="--dc:#6366f1">
    <span class="dot"></span> Overview
  </button>
  <div class="sb-label" style="margin-top:8px">Domains</div>
</nav>

<!-- MAIN CONTENT -->
<main id="content"></main>

</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DOMAINS = [
{id:'party',name:'Party',color:'#3b82f6',num:'01',role:'Foundation',
 entities:12,desc:'Every actor in insurance — persons, organizations, households — and how they relate and communicate.',
 story:`Sarah Chen walks into a Texas insurance agency. Before any quote is generated, the insurer builds her identity from the ground up. A <strong>PARTY</strong> row is created — the universal identity anchor (party_id=1001). A <strong>PERSON</strong> row extends it with her name and birth date. Her husband Mike gets his own <strong>PARTY + PERSON</strong> chain. Her LLC "Chen Consulting" gets a <strong>PARTY + ORGANIZATION</strong> pair. The family is grouped as a <strong>HOUSEHOLD</strong>. Her phone, email, and home address become three <strong>COMMUNICATION_IDENTITY</strong> rows, bridged to her via <strong>PARTY_COMMUNICATION</strong>. Her marriage to Mike is a <strong>PARTY_RELATIONSHIP</strong> row (type=SPOUSE). From now on, every single domain — policy, claim, assessment — references Sarah solely through party_id=1001. She never gets a second identity record.`,
 insights:[
  {icon:'🔑',title:'Single Identity Anchor',desc:'One PARTY row per actor. Every FK across the model points here — never directly to PERSON or ORG.'},
  {icon:'🎭',title:'Roles Live Elsewhere',desc:'"Named Insured" is NOT in PERSON. It lives in AGREEMENT_PARTY_ROLE so one party can play unlimited roles.'},
  {icon:'🔗',title:'Self-referencing',desc:'PARTY_RELATIONSHIP has two FKs pointing to PARTY — spouse, employer, owner — all in one table.'},
  {icon:'📱',title:'Decoupled Contact',desc:'COMMUNICATION_IDENTITY is independent. Multiple parties can share one address row without duplication.'},
 ],
 entities_data:[
  {name:'PARTY',type:'supertype · root',fields:[{n:'party_id',t:'BIGINT',pk:1},{n:'party_type_code',t:'CHAR(1)',note:'P/O/G'},{n:'party_name',t:'VARCHAR(100)'},{n:'begin_date',t:'DATE'},{n:'end_date',t:'DATE'}]},
  {name:'PERSON',type:'subtype of PARTY',fields:[{n:'person_id',t:'BIGINT',pk:1,fk:1,note:'FK→party'},{n:'first_name',t:'VARCHAR(40)'},{n:'last_name',t:'VARCHAR(40)'},{n:'middle_name',t:'VARCHAR(40)'},{n:'birth_date',t:'DATE'},{n:'gender_code',t:'CHAR(1)'}]},
  {name:'ORGANIZATION',type:'subtype of PARTY',fields:[{n:'org_id',t:'BIGINT',pk:1,fk:1,note:'FK→party'},{n:'org_name',t:'VARCHAR(100)'},{n:'org_type_code',t:'VARCHAR(20)',note:'LLC/CORP'},{n:'industry_code',t:'VARCHAR(20)',note:'SIC'},{n:'duns_id',t:'INT'}]},
  {name:'ORGANIZATION_UNIT',type:'subtype of ORG',fields:[{n:'org_id',t:'BIGINT',pk:1,fk:1,note:'FK→org'},{n:'org_unit_name',t:'VARCHAR(100)'},{n:'accounting_code',t:'VARCHAR(20)'},{n:'work_site_type_code',t:'VARCHAR(20)'}]},
  {name:'GROUPING',type:'subtype of PARTY',fields:[{n:'grouping_id',t:'BIGINT',pk:1,fk:1,note:'FK→party'},{n:'grouping_name',t:'VARCHAR(100)'}]},
  {name:'HOUSEHOLD',type:'subtype of GROUPING',fields:[{n:'household_id',t:'BIGINT',pk:1,fk:1,note:'FK→grouping'}]},
  {name:'PARTY_RELATIONSHIP',type:'self-referencing bridge',fields:[{n:'party_id',t:'BIGINT',pk:1,fk:1},{n:'related_party_id',t:'BIGINT',pk:1,fk:1},{n:'begin_date',t:'DATE',pk:1},{n:'relationship_type_code',t:'VARCHAR(20)',note:'SPOUSE/OWNER'},{n:'end_date',t:'DATE'}]},
  {name:'COMMUNICATION_IDENTITY',type:'contact channel',fields:[{n:'comm_id',t:'INT',pk:1},{n:'comm_type_code',t:'VARCHAR(20)',note:'PHONE/EMAIL/MAIL'},{n:'comm_value',t:'VARCHAR(1000)'},{n:'geo_location_id',t:'INT',fk:1}]},

{id:'agreement',name:'Agreement & Policy',color:'#8b5cf6',num:'02',role:'Core Contract',

 story:`The underwriter approves Sarah's application. An <strong>AGREEMENT</strong> record is created — the generic contract concept — immediately specialized as a <strong>POLICY</strong> with a policy number, effective/expiration date, and status. Her auto and umbrella are separate POLICY records. All three bundle under one <strong>ACCOUNT</strong> via <strong>ACCOUNT_AGREEMENT</strong> bridge rows — one consolidated bill. Sarah gets an <strong>AGREEMENT_PARTY_ROLE</strong> row (role=NI, Named Insured) on all three policies. Mike is Additional Insured (role=AI) on auto. The umbrella and auto are linked by a <strong>POLICY_RELATIONSHIP</strong> record (umbrella follows-form on auto). Two <strong>POLICY_FORM</strong> stamps: "HO-3" and "HO-3/TX."`,

{id:'coverage',name:'Coverage',color:'#22c55e',num:'03',role:'Coverage Catalog',
 entities:11,desc:'Products, lines of business, coverage definitions, and the critical three-way intersection linking policies to covered objects.',
 story:`Sarah's homeowners policy is an HO-3 product under the Homeowners <strong>LINE_OF_BUSINESS</strong> under the Property <strong>INSURANCE_CLASS</strong>. That product includes four <strong>COVERAGE</strong> definitions from the catalog: Coverage A (Dwelling), B (Other Structures), C (Personal Property), D (Loss of Use) — linked via <strong>PRODUCT_COVERAGE</strong>. When the policy is issued, four <strong>POLICY_COVERAGE_DETAIL</strong> rows are created — the critical three-way intersection: <em>this policy × this coverage × this insurable object</em>. Coverage A has a <strong>POLICY_LIMIT</strong> ($285,000 per-occurrence) and a <strong>POLICY_DEDUCTIBLE</strong> ($1,000). Coverage D has a limit but no deductible. Limits live on the detail row — not on the coverage definition — because Sarah's values differ from other policyholders with the same product.`,

  {icon:'📋',title:'Catalog vs Contract',desc:'COVERAGE is the reusable catalog definition. POLICY_COVERAGE_DETAIL is the contractual instance at specific limits for a specific policy.'},
  {icon:'🔀',title:'Three-Way Intersection',desc:'POLICY_COVERAGE_DETAIL ties Policy × Coverage × Insurable Object. It\'s the most-referenced table in the model.'},
  {icon:'🏭',title:'Five-Level LOB Hierarchy',desc:'Insurance Class → LOB Group → LOB → Product → Coverage. Each level enables regulatory or actuarial grouping.'},
  {icon:'💰',title:'Limits & Deductibles Separate',desc:'POLICY_LIMIT and POLICY_DEDUCTIBLE are separate tables — one coverage detail can have multiple limit types simultaneously.'},

{id:'insurable',name:'Insurable Object',color:'#f59e0b',num:'04',role:'Physical Items',

{id:'geo',name:'Geographic Location',color:'#22d3ee',num:'05',role:'Connective Tissue',
 entities:7,desc:'Self-referencing geo hierarchy (Country→State→County→City→ZIP), addresses, GPS coordinates, and rating territories.',
 story:`Sarah's home sits at 30.2672°N, 97.7431°W in Austin, TX. In the model that's five <strong>GEOGRAPHIC_LOCATION</strong> records chained by <code>parent_geo_location_id</code>: USA → Texas → Travis County → Austin → ZIP 78701. The Austin node holds a <strong>LOCATION_ADDRESS</strong> (line1, city, state, ZIP) and a <strong>PHYSICAL_LOCATION</strong> (precise lat/long used for flood zone lookup). ZIP 78701 maps to <strong>RATING_TERRITORY</strong> "TX-Central-512" via <strong>RATING_TERRITORY_GEOGRAPHIC_LOCATION</strong>. That territory code is what the rating engine uses to find the base premium multiplier. State Farm's <strong>COMPANY</strong> is licensed in Texas via <strong>COMPANY_JURISDICTION</strong>. This same geographic location node appears as a FK in 6 of the 10 domains.`,
 insights:[
  {icon:'🌎',title:'One Table, Full Hierarchy',desc:'parent_geo_location_id chains Country→State→County→City→ZIP→Risk Area. Any level can be queried independently.'},
  {icon:'📍',title:'Dual Coordinates',desc:'LOCATION_ADDRESS for postal/structured address; PHYSICAL_LOCATION for GPS coordinates (flood zone, proximity-to-coast rating).'},
  {icon:'💰',title:'Rating Territory Bridge',desc:'ZIP codes map to RATING_TERRITORY via a bridge table — the connection between geography and premium rates.'},
  {icon:'⚖️',title:'Company Licensing',desc:'COMPANY_JURISDICTION records which states each insurer is licensed in — regulatory compliance at the data level.'},
 ],

{id:'claims',name:'Claims',color:'#ef4444',num:'06',role:'Loss Events',
 entities:12,desc:'Occurrences, claims, party roles, coverage links, document folders, settlement offers, arbitration, and litigation.',
 story:`A hailstorm hits Austin on April 5th — one <strong>OCCURRENCE</strong>, geo-tagged, flagged catastrophic. Sarah calls in roof damage — a <strong>CLAIM</strong> is opened against that occurrence, linked to her dwelling (insurable_object 8001). Her homeowners Coverage A responds via <strong>CLAIM_COVERAGE</strong> → POLICY_COVERAGE_DETAIL. Sarah is Claimant ("CLM") in <strong>CLAIM_PARTY_ROLE</strong>; adjuster James is assigned ("ADJ"). James uploads his inspection report to the <strong>CLAIM_FOLDER</strong> as a <strong>CLAIM_FOLDER_DOCUMENT</strong>. A settlement of $9,800 is proposed as a <strong>CLAIM_OFFER</strong>. Sarah accepts. A separate fender-bender enters <strong>ARBITRATION</strong>. A slip-and-fall at Sarah's home goes to <strong>LITIGATION</strong>. All three claims share the same hailstorm OCCURRENCE but are separate CLAIM records.`,
 insights:[
  {icon:'⛈️',title:'OCCURRENCE ≠ CLAIM',desc:'One storm generates many claims across different policyholders. Keeping them separate enables CAT aggregation — sum all claims for catastrophe_id=201 to get total CAT exposure.'},
  {icon:'📁',title:'Folder = One-to-One',desc:'Every claim gets exactly one CLAIM_FOLDER, using claim_id as both PK and FK. Documents attach as ordered sequence rows.'},
  {icon:'🤝',title:'Multiple Offers are Normal',desc:'CLAIM_OFFER tracks every offer in negotiation. History is preserved for litigation discovery and regulatory audits.'},
  {icon:'⚖️',title:'Both Dispute Paths',desc:'Arbitration (ADR/extrajudicial) and Litigation (court proceedings) are modeled as separate entities with their own party roles.'},
 ],

{id:'clm_amt',name:'Claim Amounts',color:'#fb923c',num:'07',role:'Claim Financials',
 entities:17,desc:'Payments, reserves, and recoveries for claims — organized by insurance type (Direct/Assumed/Ceded), direction (debit/credit), and category.',
 story:`Sarah's roof hail claim has a complete financial lifecycle. When opened: adjuster sets a <strong>LOSS_RESERVE</strong> of $12,000. Contractor paid $10,500 as a <strong>LOSS_PAYMENT</strong>. James' inspection costs $400 as an <strong>EXPENSE_PAYMENT</strong>. Sarah pays her $1,000 deductible → <strong>DEDUCTIBLE_RECOVERY</strong> (money back to the insurer). The insurer pursues the roofing contractor → $1,500 <strong>SUBROGATION</strong>. The insurer ceded 20% to XYZ Re → <strong>REINSURANCE_RECOVERY</strong> of $2,100. All six are rows in <strong>CLAIM_AMOUNT</strong> — differentiated across three axes: insurance type (D/A/C), debit/credit direction, and leaf category. Unified rollup: <code>SUM(claim_amount) WHERE claim_id=6001</code>. Detailed drill-down: join to loss_payment for just contractor payments.`,
 insights:[
  {icon:'📊',title:'4-Level Deep Inheritance',desc:'CLAIM_AMOUNT → DIRECT → DEBIT → PAYMENT → LOSS_PAYMENT. Each level encodes one business dimension.'},
  {icon:'🔄',title:'Three Insurance Types',desc:'D=Direct (own book), A=Assumed (received from ceding company), C=Ceded (passed to reinsurer). Parallel sets of rows enable tri-partite ledger view.'},
  {icon:'↩️',title:'Recoveries = Money Back',desc:'SUBROGATION, SALVAGE, REINSURANCE_RECOVERY, DEDUCTIBLE_RECOVERY — all subtypes of RECOVERY under DEBIT, representing inflows to the insurer.'},
  {icon:'🔗',title:'Offer Link',desc:'claim_amount.claim_offer_id links a payment to the specific accepted offer — enabling payment-to-offer reconciliation audit.'},
 ],

 sql_tables:[
  {name:'CLAIM_AMOUNT + subtypes',code:`<span class="kw">CREATE TABLE</span> claim_amount (
  <span class="pk-c">claim_amount_id</span>      <span class="ty">BIGINT</span>        <span class="kw">NOT NULL</span>,
  <span class="fk-c">claim_id</span>            <span class="ty">INT</span>,                       <span class="cm">-- FK → claim</span>
  amount_type_code    <span class="ty">VARCHAR(20)</span>,               <span class="cm">-- discriminator</span>
  claim_amount        <span class="ty">DECIMAL(15,2)</span>,
  insurance_type_code <span class="ty">CHAR(1)</span>,                    <span class="cm">-- D=Direct A=Assumed C=Ceded</span>
  event_date          <span class="ty">DATE</span>,
  <span class="fk-c">claim_offer_id</span>      <span class="ty">INT</span>,                       <span class="cm">-- FK → claim_offer</span>
  <span class="cn">CONSTRAINT pk_claim_amount</span> <span class="kw">PRIMARY KEY</span> (<span class="pk-c">claim_amount_id</span>),
  <span class="cn">CONSTRAINT fk_ca_claim</span>     <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_id</span>) <span class="kw">REFERENCES</span> claim(<span class="pk-c">claim_id</span>)
);

<span class="cm">-- Every subtype uses same PK=FK pattern up the chain:</span>
<span class="kw">CREATE TABLE</span> debit_claim_amount  ( <span class="pk-c">claim_amount_id</span> <span class="ty">BIGINT</span> <span class="kw">NOT NULL</span> <span class="kw">PRIMARY KEY</span>, <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_amount_id</span>) <span class="kw">REFERENCES</span> claim_amount );
<span class="kw">CREATE TABLE</span> claim_payment       ( <span class="pk-c">claim_amount_id</span> <span class="ty">BIGINT</span> <span class="kw">NOT NULL</span> <span class="kw">PRIMARY KEY</span>, <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_amount_id</span>) <span class="kw">REFERENCES</span> debit_claim_amount );
<span class="kw">CREATE TABLE</span> loss_payment        ( <span class="pk-c">claim_amount_id</span> <span class="ty">BIGINT</span> <span class="kw">NOT NULL</span> <span class="kw">PRIMARY KEY</span>, <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_amount_id</span>) <span class="kw">REFERENCES</span> claim_payment );
<span class="kw">CREATE TABLE</span> claim_reserve       ( <span class="pk-c">claim_amount_id</span> <span class="ty">BIGINT</span> <span class="kw">NOT NULL</span> <span class="kw">PRIMARY KEY</span>, <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_amount_id</span>) <span class="kw">REFERENCES</span> debit_claim_amount );
<span class="kw">CREATE TABLE</span> recovery            ( <span class="pk-c">claim_amount_id</span> <span class="ty">BIGINT</span> <span class="kw">NOT NULL</span> <span class="kw">PRIMARY KEY</span>, <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_amount_id</span>) <span class="kw">REFERENCES</span> debit_claim_amount );
<span class="kw">CREATE TABLE</span> subrogation         ( <span class="pk-c">claim_amount_id</span> <span class="ty">BIGINT</span> <span class="kw">NOT NULL</span> <span class="kw">PRIMARY KEY</span>, <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_amount_id</span>) <span class="kw">REFERENCES</span> recovery );
<span class="kw">CREATE TABLE</span> deductible_recovery ( <span class="pk-c">claim_amount_id</span> <span class="ty">BIGINT</span> <span class="kw">NOT NULL</span> <span class="kw">PRIMARY KEY</span>, <span class="kw">FOREIGN KEY</span> (<span class="fk-c">claim_amount_id</span>) <span class="kw">REFERENCES</span> recovery );`},
 ]
},
{id:'pol_amt',name:'Policy Amounts',color:'#10b981',num:'08',role:'Policy Financials',
 entities:10,desc:'Premiums, taxes, surcharges, fees — with earning dates for pro-rata calculation and tri-partite Direct/Assumed/Ceded accounting.',
 story:`Sarah's auto policy generates four amounts at inception: a $1,200 annual <strong>PREMIUM</strong>, $14 state filing <strong>FEE</strong>, $24 Texas <strong>SURCHARGE</strong>, and $5.80 premium <strong>TAX</strong>. Each has <code>earning_begin_date=Jan 1</code> and <code>earning_end_date=Dec 31</code> — the earning period. Six months in, a second vehicle is added (Mid-Term Endorsement): new POLICY_AMOUNT rows with <code>earning_begin=Jul 1, earning_end=Dec 31</code> — automatically half the annual amounts. When Sarah cancels in October, a <strong>CREDIT_POLICY_AMOUNT</strong> (return premium) appears for Oct–Dec. The reinsurance treaty produces parallel <strong>CEDED_POLICY_AMOUNT</strong> rows at 20% of each direct amount. Pro-rata earned premium = <code>SUM(amount × remaining_days / total_days)</code> — no calendar logic needed; it's in the data.`,
 insights:[
  {icon:'📅',title:'Earning Dates = Pro-Rata Data',desc:'earning_begin_date / earning_end_date encode the earning period. No procedural calendar logic needed — the data drives the calculation.'},

    <div class="story-section">
      <div class="story-title">👩‍💼 The Story of Sarah Chen</div>
      <div class="story-text">All 10 domains are illustrated through a single continuous scenario — <strong>Sarah Chen</strong>, a homeowner in Austin, TX. She applies for insurance → gets a quote → binds a policy → her home is hit by hail → she files a claim → it gets settled. Along the way we see credit checks, underwriting approvals, endorsements when she adds a second car, and ultimately a cancellation. Every domain adds a new chapter to the same story. Click any domain below to begin.</div>
    </div>
    <div class="home-grid">
      ${DOMAINS.map(d=>`
      <div class="home-card" onclick="showDomain('${d.id}')" style="border-top:3px solid ${d.color}">
        <div class="hc-num">${d.num} · ${d.role}</div>
        <div class="hc-name">${d.name}</div>
        <div class="hc-count">${d.entities} entities</div>
        <div class="hc-desc">${d.desc.substring(0,80)}…</div>
      </div>`).join('')}
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 24px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px">🔑 Legend</div>
      <div style="display:flex;gap:24px;flex-wrap:wrap;font-size:12.5px;color:var(--ink2)">
        <span style="display:flex;align-items:center;gap:6px"><span style="font-size:8px;font-weight:700;color:#15803d;border:1px solid #15803d;border-radius:3px;padding:0 4px">PK</span>Primary Key</span>
        <span style="display:flex;align-items:center;gap:6px"><span style="font-size:8px;font-weight:700;color:#7c3aed;border:1px solid #7c3aed;border-radius:3px;padding:0 4px">FK</span>Foreign Key</span>
        <span style="display:flex;align-items:center;gap:6px"><code style="font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px">||──||</code>One-to-One</span>
        <span style="display:flex;align-items:center;gap:6px"><code style="font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px">||──0..*</code>One-to-Many</span>
        <span style="display:flex;align-items:center;gap:6px"><code style="font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px">0..*──0..*</code>Many-to-Many (via bridge)</span>
        <span style="display:flex;align-items:center;gap:6px">⭐ = Most-referenced entity in the domain</span>
      </div>
    </div>
  </div>`;
}

function showDomain(id){
  const d=DOMAINS.find(x=>x.id===id);
  if(!d)return;
  setActiveBtn('btn-'+id);
  document.getElementById('content').style.setProperty('--dc',d.color);
  const tab=activeTab[id]||'story';

  const html=`<div class="domain-view">
    <div class="domain-header">
      <div class="domain-eyebrow">Domain ${d.num} · ${d.role}</div>
      <h1 class="domain-title"><span class="accent">${d.name}</span></h1>
      <p class="domain-desc">${d.desc}</p>
      <div class="domain-pills">
        <span class="pill">${d.entities} entities</span>
        ${d.xlinks.map(x=>`<span class="pill">→ ${x.domain}</span>`).join('')}
      </div>
    </div>
    <div class="tabs">
      <button class="tab ${tab==='story'?'active':''}" onclick="switchTab('${id}','story',this)">📖 Use Case</button>
      <button class="tab ${tab==='entities'?'active':''}" onclick="switchTab('${id}','entities',this)">🗂 Entities</button>
      <button class="tab ${tab==='sql'?'active':''}" onclick="switchTab('${id}','sql',this)">🖥 SQL</button>
      <button class="tab ${tab==='data'?'active':''}" onclick="switchTab('${id}','data',this)">📊 Sample Data</button>
      <button class="tab ${tab==='rels'?'active':''}" onclick="switchTab('${id}','rels',this)">🔗 Relationships</button>
    </div>
    ${renderStoryPanel(d,tab==='story')}
    ${renderEntitiesPanel(d,tab==='entities')}
    ${renderSQLPanel(d,tab==='sql')}
    ${renderDataPanel(d,tab==='data')}
    ${renderRelsPanel(d,tab==='rels')}
  </div>`;

  document.getElementById('content').innerHTML=html;
  document.getElementById('content').scrollTop=0;
}

function switchTab(domainId,tab,btn){
  activeTab[domainId]=tab;
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

function renderStoryPanel(d,active){
  return `<div class="tab-panel ${active?'active':''}" id="panel-story">
    <div class="usecase">
      <div class="usecase-tag">📍 Real-world scenario</div>
      <div class="usecase-text">${d.story}</div>
    </div>
    <div class="insights">${d.insights.map(i=>`
      <div class="insight">
        <div class="insight-icon">${i.icon}</div>
        <div class="insight-title">${i.title}</div>
        <div class="insight-desc">${i.desc}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderEntitiesPanel(d,active){
  const cards=d.entities_data.map(e=>`
    <div class="entity-card" onclick="this.classList.toggle('expanded')">
      <div class="ec-head">
        <span class="ec-dot"></span>
        <span class="ec-name">${e.name}</span>
        <span class="ec-type">${e.type}</span>
        <span class="ec-toggle">▾</span>
      </div>
      <div class="ec-fields">${e.fields.map(f=>`
        <div class="ec-field">
          ${f.pk?'<span class="badge-pk">PK</span>':''}
          ${f.fk?'<span class="badge-fk">FK</span>':''}
          <span class="ec-fn">${f.n}</span>
          ${f.note?`<span style="font-size:9px;color:var(--ink3)">${f.note}</span>`:''}
          <span class="ec-ft">${f.t}</span>
        </div>`).join('')}
      </div>
    </div>`).join('');
  return `<div class="tab-panel ${active?'active':''}" id="panel-entities">
    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px">Click any card to expand fields. <span class="badge-pk">PK</span> = Primary Key &nbsp; <span class="badge-fk">FK</span> = Foreign Key</div>
    <div class="entity-grid">${cards}</div>
  </div>`;
}

function renderSQLPanel(d,active){
  const cards=(d.sql_tables||[]).map(t=>`
    <div class="sql-card">
      <div class="sql-head"><span style="color:var(--dc)">◆</span> ${t.name}</div>
      <pre class="sql-code">${t.code}</pre>
    </div>`).join('');
  return `<div class="tab-panel ${active?'active':''}" id="panel-sql">
    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px">Key schemas for this domain. Colors: <span style="color:#1d4ed8;font-family:var(--mono);font-size:11px">KEYWORD</span> &nbsp; <span style="color:#b45309;font-family:var(--mono);font-size:11px">TYPE</span> &nbsp; <span style="color:#15803d;font-family:var(--mono);font-size:11px">PK</span> &nbsp; <span style="color:#7c3aed;font-family:var(--mono);font-size:11px">FK</span></div>
    <div class="sql-section">${cards||'<div style="color:var(--ink3);font-size:13px;padding:20px">Full schema in the downloadable HTML reference.</div>'}</div>
  </div>`;
}

function renderDataPanel(d,active){
  const tables=(d.sample_tables||[]).map(t=>{
    const rows=t.rows.map((r,ri)=>`<tr>${r.map((v,ci)=>{
      let cls='';
      if(ci===t.pk)cls='v-pk';
      else if((t.fk||[]).includes(ci))cls='v-fk';
      else if((t.hi||[]).includes(ci))cls='v-hi';
      return `<td class="${cls}">${v===null?'<span class="v-null">null</span>':v}</td>`;
    }).join('')}</tr>`).join('');
    return `<div class="table-container">
      <div class="table-caption">${t.caption}<span class="table-caption-note">${t.note||''}</span></div>
      <div class="table-scroll">
        <table class="dt">
          <thead><tr>${t.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
  return `<div class="tab-panel ${active?'active':''}" id="panel-data">
    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px">
      <span style="color:#15803d;font-family:var(--mono);font-size:10px;font-weight:700;border:1px solid #15803d;border-radius:3px;padding:0 3px">PK col</span>&nbsp;
      <span style="color:#7c3aed;font-family:var(--mono);font-size:10px;font-weight:700;border:1px solid #7c3aed;border-radius:3px;padding:0 3px">FK col</span>&nbsp;
      <span style="color:var(--dc);font-family:var(--mono);font-size:10px;font-weight:700">highlighted</span> = notable value in this row
    </div>
    <div class="data-section">${tables}</div>
  </div>`;
}

function renderRelsPanel(d,active){
  const rels=d.rels.map(r=>`
    <div class="rel-item">
      <div class="rel-from">
        <span class="rel-ent">${r.from}</span>
        <span class="rel-card-label">${r.card}</span>
        <span class="rel-ent">${r.to}</span>
      </div>
      <div class="rel-desc">${r.desc}</div>
    </div>`).join('');

  const xlinks=d.xlinks.map(x=>`
    <div class="xlink">
      <div class="xlink-target"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${x.color}"></span>${x.domain}</div>
      <div class="xlink-via">${x.via}</div>
      <div class="xlink-why">${x.why}</div>
    </div>`).join('');

  return `<div class="tab-panel ${active?'active':''}" id="panel-rels">
    <div class="rel-section">
      <div class="rel-card">
        <div class="rel-head"><span class="rel-dot"></span>Within-Domain Relationships</div>
        <div class="rel-items">${rels}</div>
      </div>
    </div>
    <div class="xlinks">
      <div class="xlinks-title">Cross-Domain Foreign Key Connections</div>
      <div class="xlink-grid">${xlinks}</div>
    </div>
  </div>`;
}

// ─── SIDEBAR ACTIVE STATE ────────────────────────────────────────────────────
function setActiveBtn(id){
  document.querySelectorAll('.domain-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(id);
  if(btn){
    btn.classList.add('active');
    const c=btn.style.getPropertyValue('--dc');
    document.getElementById('content').style.setProperty('--dc',c||'#6366f1');
  }
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('search-results');

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim().toLowerCase();
  if(!q){searchResults.style.display='none';return;}
  const hits=searchIndex.filter(i=>i.name.toLowerCase().includes(q)||i.type.toLowerCase().includes(q)).slice(0,12);
  if(!hits.length){
    searchResults.style.display='block';
    searchResults.innerHTML='<div class="sr-empty">No results for "'+searchInput.value+'"</div>';
    return;
  }
  searchResults.style.display='block';
  searchResults.innerHTML=hits.map(h=>`
    <div class="sr-item" onclick="showDomain('${h.domain}');searchResults.style.display='none';searchInput.value=''">
      <div class="sr-domain"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${h.color}"></span>${h.domainName}</div>
      <div class="sr-name">${h.name}</div>
      <div class="sr-hint">${h.type} · ${h.hint}</div>
    </div>`).join('');
});

document.addEventListener('click',e=>{
  if(!e.target.closest('#search'))searchResults.style.display='none';
});

searchInput.addEventListener('keydown',e=>{
  if(e.key==='Escape'){searchResults.style.display='none';searchInput.value='';}
});

// ─── INIT ────────────────────────────────────────────────────────────────────
buildSidebar();
showHome();
</script>
</body>
</html>
